version: "3"

dotenv: [".env"]

set:
  - nounset

includes:
  api: ./taskfiles/Taskfile.api.yml
  ui:
    taskfile: ./taskfiles/Taskfile.ui.yml
    dir: ./energonsoftware
  static:
    taskfile: ./taskfiles/Taskfile.static.yml
    dir: ./static

tasks:
  default:
    silent: true
    cmds:
      - task --list

  # ── docker compose ────────────────────────────────────────────────────────

  start:
    desc: Start API via docker compose (detached)
    silent: true
    cmds:
      - docker compose up -d

  stop:
    desc: Stop and remove docker compose containers
    silent: true
    cmds:
      - docker compose stop && docker compose rm -f

  # ── aggregate ─────────────────────────────────────────────────────────────

  lint:
    desc: Run all linters (API + UI)
    deps: [api:lint, ui:lint]

  test:
    desc: Run all tests (API + UI headless)
    deps: [api:test, ui:test]

  update:
    desc: Update all dependencies (API + UI)
    deps: [api:update, ui:update]

  clean:
    desc: Remove build artifacts
    silent: true
    cmds:
      - cargo clean
      - rm -rf bin/
      - rm -rf energonsoftware/dist

  really-clean:
    desc: Clean and remove Docker images
    silent: true
    deps: [clean]
    cmds:
      - docker image prune --filter label=com.docker.compose.project=energonsoftware
      - docker rmi -f energonsoftware-api
